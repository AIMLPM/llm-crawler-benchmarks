name: Sync markcrawl benchmarks

on:
  push:
    branches: [main]
    paths:
      - "reports/*.md"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llm-crawler-benchmarks
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Clone markcrawl
        run: |
          git clone https://x-access-token:${{ secrets.MARKCRAWL_PAT }}@github.com/AIMLPM/markcrawl.git /tmp/markcrawl

      - name: Run sync
        run: |
          python self_improvement/sync_markcrawl.py \
            --markcrawl-dir /tmp/markcrawl \
            --reports-dir reports/

      - name: Check for changes
        id: diff
        working-directory: /tmp/markcrawl
        run: |
          if git diff --quiet README.md docs/BENCHMARKS.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: /tmp/markcrawl
        env:
          GH_TOKEN: ${{ secrets.MARKCRAWL_PAT }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="bench/sync-${SHORT_SHA}"

          git config user.name "benchmark-bot"
          git config user.email "noreply@github.com"
          git checkout -b "${BRANCH}"
          git add README.md docs/BENCHMARKS.md
          git commit -m "Update benchmark numbers from llm-crawler-benchmarks

          Source: AIMLPM/llm-crawler-benchmarks@${SHORT_SHA}"

          git push origin "${BRANCH}"

          gh pr create \
            --title "Update benchmark numbers" \
            --body "$(cat <<EOF
          ## Summary
          - Auto-generated update of README and docs/BENCHMARKS.md from report changes.
          - Source commit: AIMLPM/llm-crawler-benchmarks@${{ github.sha }}

          ## Files changed
          - \`README.md\` — \`<details>\` benchmark section
          - \`docs/BENCHMARKS.md\` — full benchmark page

          ## Verify
          - [ ] Numbers match source reports
          - [ ] Summary claims are factually accurate

          Generated by [sync workflow](https://github.com/AIMLPM/llm-crawler-benchmarks/actions/workflows/sync-readme.yml)
          EOF
          )" \
            --base main

name: Sync markcrawl README

on:
  push:
    branches: [main]
    paths:
      - "reports/*.md"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout llm-crawler-bench
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Clone markcrawl
        run: |
          git clone https://x-access-token:${{ secrets.MARKCRAWL_PAT }}@github.com/AIMLPM/markcrawl.git /tmp/markcrawl

      - name: Run sync
        run: |
          python self_improvement/sync_readme.py \
            --markcrawl-readme /tmp/markcrawl/README.md \
            --reports-dir reports/

      - name: Check for changes
        id: diff
        working-directory: /tmp/markcrawl
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: /tmp/markcrawl
        env:
          GH_TOKEN: ${{ secrets.MARKCRAWL_PAT }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="bench/sync-readme-${SHORT_SHA}"

          git checkout -b "${BRANCH}"
          git add README.md
          git commit -m "Update benchmark numbers from llm-crawler-bench

          Source: AIMLPM/llm-crawler-bench@${SHORT_SHA}"

          git push origin "${BRANCH}"

          gh pr create \
            --title "Update benchmark numbers" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automated update of benchmark numbers in README from llm-crawler-bench report changes.
          - Source commit: AIMLPM/llm-crawler-bench@${{ github.sha }}

          ## Verify
          - [ ] Numbers match source reports
          - [ ] Links resolve correctly

          Generated by [sync-readme workflow](https://github.com/AIMLPM/llm-crawler-bench/actions/workflows/sync-readme.yml)
          EOF
          )" \
            --base main
